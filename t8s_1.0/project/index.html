<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#070A12" />
    <title>Techno8solutions Lead Generation Website</title>
    <script>
      try {
        var savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') document.documentElement.classList.add('dark');
      } catch {}
    </script>
    <style>
      /* Critical loader (renders before JS/CSS) */
	      #app-loader {
	        position: fixed;
	        inset: 0;
	        z-index: 9999;
	        display: grid;
	        place-items: center;
	        padding: 24px;
	        color: rgba(15, 23, 42, 0.92);
	        opacity: 1;
	        transform: translateY(0);
	        transition: opacity 200ms ease, transform 200ms ease;
	        will-change: opacity, transform;
	      }
	      #app-loader[data-exit='1'] {
	        opacity: 0;
	        transform: translateY(-4px);
	        pointer-events: none;
	      }
      #app-loader * {
        box-sizing: border-box;
      }
      #app-loader .bg {
        position: absolute;
        inset: 0;
        background-color: #f8fafc;
        background-image:
          radial-gradient(1200px 600px at 15% 10%, rgba(59, 130, 246, 0.22), transparent 60%),
          radial-gradient(900px 500px at 80% 20%, rgba(168, 85, 247, 0.18), transparent 55%),
          radial-gradient(900px 520px at 50% 100%, rgba(16, 185, 129, 0.16), transparent 55%),
          linear-gradient(to bottom, rgba(255, 255, 255, 0.78), rgba(255, 255, 255, 0.24));
      }
      :root.dark #app-loader {
        color: rgba(248, 250, 252, 0.92);
      }
      :root.dark #app-loader .bg {
        background-color: #070a12;
        background-image:
          radial-gradient(1200px 600px at 15% 10%, rgba(59, 130, 246, 0.22), transparent 60%),
          radial-gradient(900px 500px at 80% 20%, rgba(168, 85, 247, 0.18), transparent 55%),
          radial-gradient(900px 520px at 50% 100%, rgba(16, 185, 129, 0.16), transparent 55%),
          linear-gradient(to bottom, rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.68));
      }
      #app-loader .card {
        position: relative;
        width: min(520px, 100%);
        border-radius: 28px;
        padding: 28px;
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(255, 255, 255, 0.18);
        box-shadow: 0 18px 60px -32px rgba(0, 0, 0, 0.55);
        backdrop-filter: blur(22px);
        -webkit-backdrop-filter: blur(22px);
        overflow: hidden;
      }
      :root.dark #app-loader .card {
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.12);
      }
      #app-loader .mark {
        width: 56px;
        height: 56px;
        border-radius: 18px;
        margin: 0 auto 14px;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        position: relative;
        overflow: hidden;
      }
      #app-loader .mark::after {
        content: '';
        position: absolute;
        inset: -90px;
        background: conic-gradient(from 0deg, transparent 0 20%, rgba(255, 255, 255, 0.65) 30%, transparent 55%);
        animation: appLoaderSpin 1.05s linear infinite;
      }
      #app-loader .title {
        font-size: 22px;
        font-weight: 750;
        letter-spacing: -0.02em;
        background: linear-gradient(90deg, #3b82f6, #8b5cf6, #34d399);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      #app-loader .subtitle {
        margin-top: 8px;
        font-size: 14px;
        opacity: 0.78;
      }
      #app-loader .dots {
        margin-top: 12px;
        display: inline-flex;
        gap: 8px;
        align-items: center;
      }
      #app-loader .dot {
        width: 7px;
        height: 7px;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.35);
        animation: appLoaderDot 900ms ease-in-out infinite;
      }
      :root.dark #app-loader .dot {
        background: rgba(248, 250, 252, 0.35);
      }
      #app-loader .dot:nth-child(2) {
        animation-delay: 120ms;
      }
      #app-loader .dot:nth-child(3) {
        animation-delay: 240ms;
      }
      #app-loader .bar {
        margin: 16px auto 0;
        width: min(320px, 100%);
        height: 10px;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.28);
        border: 1px solid rgba(255, 255, 255, 0.25);
      }
      :root.dark #app-loader .bar {
        background: rgba(255, 255, 255, 0.12);
        border-color: rgba(255, 255, 255, 0.12);
      }
      #app-loader .bar::after {
        content: '';
        display: block;
        height: 100%;
        width: 45%;
        border-radius: 999px;
        background: linear-gradient(90deg, rgba(59, 130, 246, 0.2), rgba(139, 92, 246, 0.75), rgba(52, 211, 153, 0.5));
        transform: translateX(-120%);
        animation: appLoaderBar 1.1s ease-in-out infinite;
      }
      #app-loader .hint {
        margin-top: 12px;
        font-size: 12px;
        opacity: 0.72;
      }
      @keyframes appLoaderSpin {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes appLoaderBar {
        0% {
          transform: translateX(-120%);
        }
        60% {
          transform: translateX(185%);
        }
        100% {
          transform: translateX(185%);
        }
      }
      @keyframes appLoaderDot {
        0%,
        100% {
          transform: translateY(0);
          opacity: 0.55;
        }
        50% {
          transform: translateY(-4px);
          opacity: 1;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #app-loader .mark::after,
        #app-loader .bar::after,
        #app-loader .dot {
          animation: none !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="app-loader" aria-label="Loading" role="status">
      <div class="bg"></div>
      <div class="card">
        <div class="mark"></div>
        <div class="title">Techno8solutions</div>
        <div class="subtitle">Crafting a premium experience</div>
        <div class="dots" aria-hidden="true">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
        <div class="bar" aria-hidden="true"></div>
        <div class="hint">Tip: Toggle dark mode anytime.</div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
